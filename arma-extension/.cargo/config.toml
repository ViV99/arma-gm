# Cross-compilation config for building on macOS targeting Windows.
#
# Prerequisites:
#   rustup target add x86_64-pc-windows-gnu i686-pc-windows-gnu
#   brew install mingw-w64
#
# Build commands:
#   64-bit: cargo build --release --target x86_64-pc-windows-gnu
#     Output: target/x86_64-pc-windows-gnu/release/arma_gm_ext.dll
#     Copy to Arma 3 directory as arma_gm_ext_x64.dll
#
#   32-bit: cargo build --release --target i686-pc-windows-gnu
#     Output: target/i686-pc-windows-gnu/release/arma_gm_ext.dll
#     Copy to Arma 3 directory as arma_gm_ext.dll

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"

[target.i686-pc-windows-gnu]
linker = "i686-w64-mingw32-gcc"
